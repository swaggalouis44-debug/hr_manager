<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HR Agency</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh; display: flex; 
            justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            font-family: Arial, sans-serif; color: white; text-align: center;
        }
        .container { padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .btn {
            display: inline-block; padding: 15px 30px; font-size: 1.2rem;
            color: white; background: #007bff; border: none; 
            border-radius: 50px; text-decoration: none; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }
        .btn:hover { background: #0056b3; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI HR Agency</h1>
        <p>Ваш интеллектуальный HR-помощник готов к работе</p>
        <a href="https://hf.space" class="btn">Запустить приложение</a>
    </div>
</body>
</html>
